<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Field Types Test Page</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding: 2rem; font-family: sans-serif; }
    section { margin-bottom: 2rem; padding: 1rem; border: 1px solid #ccc; border-radius: 4px; }
    h2 { font-size: 1.2rem; margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.5rem; }
    [contenteditable] {
      border: 1px solid #999; padding: 8px; min-height: 40px; border-radius: 4px;
    }
  </style>
</head>
<body>
  <h1>Field Types Test Page</h1>

  <!-- Text input -->
  <section data-testid="text-section">
    <h2>Text Input</h2>
    <label for="username">Username</label>
    <input type="text" id="username" name="username" placeholder="Enter username">
  </section>

  <!-- Textarea -->
  <section data-testid="textarea-section">
    <h2>Textarea</h2>
    <label for="bio">Bio</label>
    <textarea id="bio" name="bio" rows="3" placeholder="Enter bio"></textarea>
  </section>

  <!-- Checkbox -->
  <section data-testid="checkbox-section">
    <h2>Checkbox</h2>
    <label>
      <input type="checkbox" id="agree" name="agree"> I agree to terms
    </label>
    <label>
      <input type="checkbox" id="newsletter" name="newsletter"> Subscribe to newsletter
    </label>
  </section>

  <!-- Radio buttons -->
  <section data-testid="radio-section">
    <h2>Radio Buttons</h2>
    <div id="color-radios">
      <label>
        <input type="radio" name="color" value="red"> Red
      </label>
      <label>
        <input type="radio" name="color" value="green"> Green
      </label>
      <label>
        <input type="radio" name="color" value="blue"> Blue
      </label>
    </div>
  </section>

  <!-- Select dropdown -->
  <section data-testid="select-section">
    <h2>Select Dropdown</h2>
    <label for="country">Country</label>
    <select id="country" name="country">
      <option value="">-- Select --</option>
      <option value="us">United States</option>
      <option value="uk">United Kingdom</option>
      <option value="ca">Canada</option>
    </select>
  </section>

  <!-- Contenteditable -->
  <section data-testid="contenteditable-section">
    <h2>Contenteditable</h2>
    <div id="editor" contenteditable="true" data-testid="editor">Edit me</div>
  </section>

  <!-- Bootstrap dropdown -->
  <section data-testid="bootstrap-dropdown-section">
    <h2>Bootstrap Dropdown</h2>
    <div id="bs-priority" class="dropdown">
      <button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
        Select Priority
      </button>
      <ul class="dropdown-menu">
        <li><a class="dropdown-item" href="#" data-value="low">Low</a></li>
        <li><a class="dropdown-item" href="#" data-value="medium">Medium</a></li>
        <li><a class="dropdown-item" href="#" data-value="high">High</a></li>
      </ul>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Make bootstrap dropdown update the toggle text on selection
    document.querySelectorAll('#bs-priority .dropdown-item').forEach(item => {
      item.addEventListener('click', (e) => {
        e.preventDefault();
        const toggle = document.querySelector('#bs-priority .dropdown-toggle');
        toggle.textContent = e.target.textContent;
      });
    });
  </script>
</body>
</html>
