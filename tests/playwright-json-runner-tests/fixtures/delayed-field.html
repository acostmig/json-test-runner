<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Delayed Field Test Page</title>
</head>
<body>
  <h1>Delayed Field Test</h1>
  <p>The input below appears after 2 seconds.</p>

  <div id="container"></div>

  <script>
    setTimeout(() => {
      const input = document.createElement('input');
      input.type = 'text';
      input.id = 'delayed-input';
      input.placeholder = 'I appeared late';
      document.getElementById('container').appendChild(input);
    }, 2000);
  </script>
</body>
</html>
